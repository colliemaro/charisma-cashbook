<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma Distillers • Finance Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Ubuntu', sans-serif; 
            background: #050505; 
            color: white; 
            margin: 0; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
       
        .liquid-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(135deg, #050505 0%, #0a0a1a 100%);
        }
        .liquid-blob {
            position: absolute; width: 900px; height: 900px;
            background: radial-gradient(circle, rgba(250, 204, 21, 0.12) 0%, rgba(79, 70, 229, 0.08) 40%, transparent 70%);
            filter: blur(100px); border-radius: 50%;
            animation: flow 25s infinite alternate ease-in-out;
        }
        @keyframes flow {
            0% { transform: translate(-20%, -20%) rotate(0deg); }
            100% { transform: translate(30%, 15%) rotate(180deg); }
        }
        .glass { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(40px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar.closed { transform: translateX(-100%); }
       
        input, select, textarea {
            background: rgba(0,0,0,0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus { 
            border-color: #facc15 !important; 
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2); 
        }
    </style>
</head>
<body>
    <div class="liquid-bg"><div class="liquid-blob"></div></div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div id="login-card" class="glass p-12 rounded-[3rem] w-full max-w-md text-center border-amber-500/20">
            <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-28 mx-auto mb-6 drop-shadow-2xl">
            <h2 class="text-xl font-bold mb-8 uppercase tracking-[0.3em] text-amber-400">Security Gateway</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" placeholder="Authorized ID" class="w-full rounded-2xl px-6 py-4 outline-none transition-all">
                <input type="password" id="password" placeholder="Access Code" class="w-full rounded-2xl px-6 py-4 outline-none transition-all">
                <button type="submit" class="w-full bg-amber-400 text-black font-bold py-5 rounded-2xl hover:bg-amber-300 transition-all uppercase tracking-widest shadow-xl shadow-amber-500/20">Enter Vault</button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden">Incorrect username or password.</p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="main-app" class="hidden flex-1 flex flex-col">
        <!-- Header with Logo -->
        <header class="p-6 flex items-center justify-between sticky top-0 z-50 glass border-b border-white/5">
            <div class="flex items-center gap-6">
                <button onclick="toggleMenu()" class="p-3 glass rounded-xl hover:bg-white/5 border border-white/10">
                    <div class="w-6 h-0.5 bg-amber-400 mb-1.5"></div>
                    <div class="w-4 h-0.5 bg-amber-400 mb-1.5"></div>
                    <div class="w-6 h-0.5 bg-amber-400"></div>
                </button>
                <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-12">
                <div>
                    <h1 class="text-2xl font-bold tracking-tighter text-amber-300">CHARISMA DISTILLERS</h1>
                    <p class="text-[10px] text-amber-400 tracking-widest">FINANCE VAULT</p>
                </div>
            </div>
           
            <div class="text-right">
                <div id="digital-clock" class="text-amber-400 font-mono text-2xl font-bold tracking-tighter">00:00:00</div>
                <div id="digital-date" class="text-[10px] text-zinc-400 uppercase tracking-widest font-medium">-- -- ----</div>
            </div>
        </header>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar closed fixed top-0 left-0 h-full w-80 glass p-8 flex flex-col border-r border-white/10">
            <div class="flex justify-between items-center mb-10">
                <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-10">
                <button onclick="toggleMenu()" class="text-3xl text-zinc-500">&times;</button>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="showPage('entry')" class="w-full text-left p-4 rounded-2xl hover:bg-amber-400 hover:text-black transition-all flex items-center gap-4 font-bold">
                    <span>📥</span> <span data-en="New Transaction" data-sw="Muamala Mpya">Muamala Mpya</span>
                </button>
                <button onclick="showPage('ledger')" class="w-full text-left p-4 rounded-2xl hover:bg-amber-400 hover:text-black transition-all flex items-center gap-4 font-bold">
                    <span>📖</span> <span data-en="Audit Book" data-sw="Daftari Kuu">Daftari Kuu</span>
                </button>
                <button id="btn-ceo" onclick="showPage('manager')" class="w-full text-left p-4 rounded-2xl border border-amber-500/20 hover:bg-amber-400 hover:text-black transition-all flex items-center gap-4 font-bold hidden">
                    <span>⚜️</span> <span data-en="CEO Intelligence" data-sw="Usimamizi wa CEO">Usimamizi wa CEO</span>
                </button>
            </nav>

            <!-- Suggestion Box for Workers -->
            <div class="mt-8 pt

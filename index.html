<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma Nebula • Diagnostics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Ubuntu', sans-serif; background: #0a0a0a; color: white; margin: 0; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d0d0d, #000); }
        .orb { position: absolute; width: 500px; height: 500px; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: move 20s infinite alternate; }
        .orb-1 { background: #facc15; top: -10%; left: -5%; }
        .orb-2 { background: #6366f1; bottom: -10%; right: -5%; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(50px, 50px); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(250, 204, 21, 0.15); }
        .shake { animation: shake 0.4s both; border-color: #ef4444 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="nebula"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div id="login-card" class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center">
            <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-20 mx-auto mb-6">
            <h2 class="text-2xl font-bold mb-6">System Diagnostics Mode</h2>
            
            <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
                <label class="text-[10px] uppercase ml-2 text-zinc-500 font-bold">Username</label>
                <input type="text" id="username" class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-amber-400">
                
                <label class="text-[10px] uppercase ml-2 text-zinc-500 font-bold">Password</label>
                <input type="password" id="password" class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-amber-400">
                
                <button type="submit" class="w-full bg-amber-400 text-black font-bold py-4 rounded-2xl mt-4">Run Login Test</button>
            </form>
        </div>
    </div>

    <div id="main-app" class="hidden p-10 text-center">
        <h1 class="text-4xl font-bold text-amber-400">LOGIN SUCCESSFUL!</h1>
        <p class="mt-4 text-zinc-400">Welcome to the Nebula Interface.</p>
        <button onclick="location.reload()" class="mt-8 px-6 py-2 bg-white/10 rounded-xl">Logout</button>
    </div>

    <script>
        // The core database of users
        const users = {
            "charisma_ceo": { pass: "Tunaweza,2026", name: "Collins" },
            "OdriaToto": { pass: "Tunaweza,2026", name: "Odria" },
            "BerthaToto": { pass: "Tunaweza,2026", name: "Bertha" }
        };

        function handleLogin(e) {
            e.preventDefault();
            const uInput = document.getElementById('username').value.trim();
            const pInput = document.getElementById('password').value.trim();
            const card = document.getElementById('login-card');

            console.log("Attempting login for:", uInput);

            // 1. Check if the user exists
            const foundUserKey = Object.keys(users).find(
                key => key.toLowerCase() === uInput.toLowerCase()
            );

            if (!foundUserKey) {
                alert("❌ ERROR: Username '" + uInput + "' not found in the system.");
                fail(card);
                return;
            }

            // 2. Check if password matches
            if (users[foundUserKey].pass !== pInput) {
                alert("❌ ERROR: Password incorrect for " + foundUserKey + ".\n\nYou typed: " + pInput + "\nExpected: " + users[foundUserKey].pass);
                fail(card);
                return;
            }

            // 3. Success
            alert("✅ SUCCESS: Hello " + users[foundUserKey].name + "! Accessing Nebula...");
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }

        function fail(card) {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 400);
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>

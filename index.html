<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma Financial Nebula • CEO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #facc15; }
        body { font-family: 'Ubuntu', sans-serif; background: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }

        /* GEMINI NEBULA ANIMATION */
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d0d0d, #000); }
        .orb { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.3; animation: move 20s infinite alternate ease-in-out; }
        .orb-1 { background: #facc15; top: -10%; left: -5%; }
        .orb-2 { background: #4f46e5; bottom: -10%; right: -5%; animation-delay: -5s; }
        @keyframes move { from { transform: translate(0,0) scale(1); } to { transform: translate(100px, 100px) scale(1.2); } }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(250, 204, 21, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        /* SHAKE & RED BEEP */
        .shake { animation: shake 0.4s both; border: 2px solid #ef4444 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }

        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar.closed { transform: translateX(-100%); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="nebula"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div id="login-card" class="glass p-12 rounded-[3rem] w-full max-w-md text-center">
            <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-24 mx-auto mb-8">
            <h2 class="text-3xl font-bold mb-8 tracking-tighter" data-en="Charisma Access" data-sw="Kuingia Charisma">Kuingia Charisma</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 focus:border-amber-400 outline-none text-white">
                <input type="password" id="password" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 focus:border-amber-400 outline-none text-white">
                <button type="submit" class="w-full bg-amber-400 text-black font-bold py-5 rounded-2xl shadow-lg shadow-amber-500/20 active:scale-95 transition-all">Sign In</button>
            </form>
            <p id="error-msg" class="text-red-500 text-sm mt-4 font-bold hidden"></p>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="p-6 flex items-center justify-between sticky top-0 z-50 glass">
            <button onclick="toggleMenu()" class="p-3 glass rounded-xl">
                <div class="w-6 h-0.5 bg-amber-400 mb-1.5"></div>
                <div class="w-4 h-0.5 bg-amber-400 mb-1.5"></div>
                <div class="w-6 h-0.5 bg-amber-400"></div>
            </button>
            <div class="text-right">
                <p id="user-display" class="font-bold text-amber-400"></p>
                <button onclick="toggleLang()" class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Toggle EN/SW</button>
            </div>
        </header>

        <aside id="sidebar" class="sidebar closed fixed top-0 left-0 h-full w-72 glass p-8 flex flex-col">
            <button onclick="toggleMenu()" class="self-end text-3xl mb-12">&times;</button>
            <nav class="space-y-4 flex-1">
                <button onclick="showPage('entry')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 flex items-center gap-3">📝 <span data-en="Daily Entry" data-sw="Ingizo la Siku">Ingizo la Siku</span></button>
                <button id="btn-ceo" onclick="showPage('manager')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 flex items-center gap-3 hidden">📊 <span data-en="Managerial View" data-sw="Usimamizi">Usimamizi</span></button>
            </nav>
            <button onclick="location.reload()" class="p-4 bg-red-500/10 text-red-400 rounded-2xl font-bold">Logout</button>
        </aside>

        <main class="max-w-4xl mx-auto p-6">
            <div id="page-entry">
                <h2 class="text-4xl font-bold mb-8 tracking-tighter" data-en="Record Transaction" data-sw="Rekodi Muamala">Rekodi Muamala</h2>
                <div class="glass p-8 rounded-[2.5rem] space-y-6">
                    <input type="text" id="entry-desc" placeholder="Maelezo (Description)" class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 outline-none">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="entry-in" placeholder="In (+)" class="w-full bg-black/40 border border-emerald-500/20 rounded-2xl px-6 py-4 text-emerald-400 outline-none">
                        <input type="number" id="entry-out" placeholder="Out (-)" class="w-full bg-black/40 border border-red-500/20 rounded-2xl px-6 py-4 text-red-400 outline-none">
                    </div>
                    <button onclick="submitEntry()" id="submit-btn" class="w-full bg-white text-black font-bold py-5 rounded-2xl hover:bg-amber-400 transition-all">Push to Cloud</button>
                </div>
            </div>

            <div id="page-manager" class="hidden">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-4xl font-bold tracking-tighter">Managerial View</h2>
                    <button onclick="fetchData()" class="bg-amber-400 text-black px-6 py-3 rounded-2xl font-bold shadow-lg shadow-amber-400/20">🔄 Retrieve Data</button>
                </div>
                <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
                <div class="glass rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-white/5"><tr class="text-zinc-500 text-xs uppercase tracking-widest font-bold"><th class="p-6">User</th><th class="p-6">Details</th><th class="p-6 text-right">Amount</th></tr></thead>
                        <tbody id="manager-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnkgEBgTnZg0JF8r5JRjH6Qo_ZoMsysd9LQ-UphExcttwx-gAnf2VjH03CQyqNTPwndg/exec";

        const users = {
            "charisma_ceo": { pass: "Tunaweza,2026", role: "ceo", name: "Collins", lang: "en" },
            "OdriaToto": { pass: "Tunaweza,2026", role: "worker", name: "Odria", lang: "sw" },
            "BerthaToto": { pass: "Tunaweza,2026", role: "worker", name: "Bertha", lang: "sw" }
        };

        let currentLang = 'sw';
        let currentUser = null;

        function handleLogin(e) {
            e.preventDefault();
            const uInput = document.getElementById('username').value.trim();
            const pInput = document.getElementById('password').value.trim();
            const card = document.getElementById('login-card');
            const err = document.getElementById('error-msg');

            const foundUserKey = Object.keys(users).find(key => key.toLowerCase() === uInput.toLowerCase());

            if (foundUserKey && users[foundUserKey].pass === pInput) {
                currentUser = users[foundUserKey];
                currentLang = currentUser.lang;
                startApp();
            } else {
                card.classList.add('shake');
                err.innerText = "Incorrect username or password.";
                err.classList.remove('hidden');
                setTimeout(() => card.classList.remove('shake'), 400);
            }
        }

        function startApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Habari, ${currentUser.name}`;
            if (currentUser.role === 'ceo') document.getElementById('btn-ceo').classList.remove('hidden');
            updateTranslations();
        }

        function toggleLang() {
            currentLang = currentLang === 'sw' ? 'en' : 'sw';
            updateTranslations();
        }

        function updateTranslations() {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('closed'); }

        function showPage(p) {
            document.getElementById('page-entry').classList.add('hidden');
            document.getElementById('page-manager').classList.add('hidden');
            document.getElementById(`page-${p}`).classList.remove('hidden');
            toggleMenu();
        }

        async function submitEntry() {
            const btn = document.getElementById('submit-btn');
            const data = {
                user: currentUser.name,
                date: new Date().toLocaleString(),
                desc: document.getElementById('entry-desc').value,
                receipt: document.getElementById('entry-in').value || 0,
                payment: document.getElementById('entry-out').value || 0
            };

            if (!data.desc) return alert("Please add description!");
            
            btn.innerText = "...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Success! Data synced.");
                location.reload();
            } catch (e) { alert("Sync failed."); btn.innerText = "Push to Cloud"; }
        }

        async function fetchData() {
            const tbody = document.getElementById('manager-tbody');

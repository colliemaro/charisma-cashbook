<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Ubuntu', sans-serif; background: #0a0a0a; color: white; margin: 0; overflow-x: hidden; }
        .nebula { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0d0d0d, #000); }
        .orb { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.25; animation: move 20s infinite alternate ease-in-out; }
        .orb-1 { background: #facc15; top: -10%; left: -5%; }
        .orb-2 { background: #4f46e5; bottom: -10%; right: -5%; animation-delay: -5s; }
        @keyframes move { from { transform: translate(0,0); } to { transform: translate(80px, 80px); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shake { animation: shake 0.4s both; border: 1px solid #ef4444 !important; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } }
        .sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        .sidebar.closed { transform: translateX(-100%); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="nebula"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div id="login-screen" class="fixed inset-0 z-[200] flex items-center justify-center p-6">
        <div id="login-card" class="glass p-12 rounded-[3rem] w-full max-w-md text-center">
            <img src="https://i.ibb.co/604LgYYS/Charisma-Distillers-logo-design.png" class="h-20 mx-auto mb-8">
            <h2 class="text-2xl font-bold mb-8 tracking-tighter">Charisma Distillers Login</h2>
            <form onsubmit="handleLogin(event)" class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full bg-black/50 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-amber-400">
                <input type="password" id="password" placeholder="Password" class="w-full bg-black/50 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-amber-400">
                <button type="submit" class="w-full bg-amber-400 text-black font-bold py-5 rounded-2xl active:scale-95 transition-all">Sign In</button>
            </form>
            <p id="login-error" class="text-red-500 text-xs mt-4 font-bold hidden">Incorrect username or password.</p>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <header class="p-6 flex items-center justify-between sticky top-0 z-50 glass">
            <button onclick="toggleMenu()" class="p-3 glass rounded-xl border border-white/10">
                <div class="w-6 h-0.5 bg-amber-400 mb-1.5"></div>
                <div class="w-4 h-0.5 bg-amber-400 mb-1.5"></div>
                <div class="w-6 h-0.5 bg-amber-400"></div>
            </button>
            <div class="text-right">
                <p id="user-display" class="font-bold text-amber-400">Habari, User</p>
                <button onclick="toggleLang()" class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">EN / SW</button>
            </div>
        </header>

        <aside id="sidebar" class="sidebar closed fixed top-0 left-0 h-full w-72 glass p-8 flex flex-col border-r border-white/10">
            <div class="flex justify-between items-center mb-12">
                <span class="text-xs font-bold text-amber-500 uppercase tracking-widest">Menu</span>
                <button onclick="toggleMenu()" class="text-3xl">&times;</button>
            </div>
            <nav class="space-y-4 flex-1">
                <button onclick="showPage('entry')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 flex items-center gap-3">
                    📝 <span data-en="Record Data" data-sw="Weka Kumbukumbu">Weka Kumbukumbu</span>
                </button>
                <button id="btn-ceo" onclick="showPage('manager')" class="w-full text-left p-4 rounded-2xl hover:bg-white/5 flex items-center gap-3 hidden">
                    📊 <span data-en="CEO Vault" data-sw="Usimamizi wa CEO">Usimamizi wa CEO</span>
                </button>
            </nav>
            <button onclick="location.reload()" class="p-4 bg-red-500/10 text-red-400 rounded-2xl font-bold text-sm">Sign Out</button>
        </aside>

        <main class="max-w-4xl mx-auto p-6">
            <div id="page-entry">
                <h2 class="text-4xl font-bold mb-8 tracking-tighter" data-en="Daily Ledger" data-sw="Daftari la Leo">Daftari la Leo</h2>
                <div class="glass p-8 rounded-[2.5rem] space-y-6">
                    <input type="text" id="entry-desc" placeholder="Maelezo..." class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-amber-400">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="entry-in" placeholder="In (+)" class="w-full bg-black/40 border border-emerald-500/20 rounded-2xl px-6 py-4 text-emerald-400 outline-none">
                        <input type="number" id="entry-out" placeholder="Out (-)" class="w-full bg-black/40 border border-red-500/20 rounded-2xl px-6 py-4 text-red-400 outline-none">
                    </div>
                    <button onclick="submitEntry()" id="submit-btn" class="w-full bg-white text-black font-bold py-5 rounded-2xl hover:bg-amber-400 transition-all">Sync to Cloud</button>
                </div>
            </div>

            <div id="page-manager" class="hidden">
                <div class="flex justify-between items-end mb-8">
                    <h2 class="text-4xl font-bold tracking-tighter">Managerial</h2>
                    <button onclick="fetchData()" class="bg-amber-400 text-black px-6 py-3 rounded-xl font-bold">🔄 Sync Data</button>
                </div>
                <div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8"></div>
                <div class="glass rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left"><tbody id="manager-tbody"></tbody></table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnkgEBgTnZg0JF8r5JRjH6Qo_ZoMsysd9LQ-UphExcttwx-gAnf2VjH03CQyqNTPwndg/exec";

        const users = {
            "charisma_ceo": { pass: "Tunaweza,2026", role: "ceo", name: "Collins", lang: "en" },
            "odriatoto": { pass: "Tunaweza,2026", role: "worker", name: "Odria", lang: "sw" },
            "berthatoto": { pass: "Tunaweza,2026", role: "worker", name: "Bertha", lang: "sw" },
            "admin": { pass: "123", role: "ceo", name: "Admin", lang: "en" } // MASTER BYPASS
        };

        let currentLang = 'sw';
        let currentUser = null;

        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            const card = document.getElementById('login-card');
            const err = document.getElementById('login-error');

            if (users[u] && users[u].pass === p) {
                currentUser = users[u];
                currentLang = currentUser.lang;
                
                // HIDE LOGIN, SHOW APP
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // SETUP UI
                document.getElementById('user-display').innerText = `Habari, ${currentUser.name}`;
                if (currentUser.role === 'ceo') document.getElementById('btn-ceo').classList.remove('hidden');
                
                updateTranslations();
            } else {
                card.classList.add('shake');
                err.classList.remove('hidden');
                setTimeout(() => card.classList.remove('shake'), 400);
            }
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('closed'); }
        function toggleLang() { currentLang = currentLang === 'sw' ? 'en' : 'sw'; updateTranslations(); }

        function updateTranslations() {
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });
        }

        function showPage(p) {
            document.getElementById('page-entry').classList.add('hidden');
            document.getElementById('page-manager').classList.add('hidden');
            document.getElementById(`page-${p}`).classList.remove('hidden');
            toggleMenu();
        }

        async function submitEntry() {
            const btn = document.getElementById('submit-btn');
            const data = {
                user: currentUser.name, date: new Date().toLocaleString(),
                desc: document.getElementById('entry-desc').value,
                receipt: document.getElementById('entry-in').value || 0,
                payment: document.getElementById('entry-out').value || 0
            };
            if (!data.desc) return alert("Weka maelezo!");
            btn.innerText = "Syncing...";
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert("Success!"); location.reload();
            } catch (e) { alert("Error."); btn.innerText = "Sync to Cloud"; }
        }

        async function fetchData() {
            const tbody = document.getElementById('manager-tbody');
            tbody.innerHTML = "<tr><td class='p-10 text-center'>Loading...</td></tr>";
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                const rows = data.slice(1).reverse();
                tbody.innerHTML = rows.map(r => `
                    <tr class="border-b border-white/5">
                        <td class="p-6 font-bold text-amber-400">${r[1]}</td>
                        <td class="p-6 text-xs">${r[3]}<br><span class="text-zinc-500">${r[2]}</span></td>
                        <td class="p-6 text-right font-bold ${r[4] > 0 ? 'text-emerald-400' : 'text-red-400'}">
                            ${r[4] > 0 ? '+'+r[4] : '-'+r[5]}
                        </td>
                    </tr>
                `).join('');
            } catch (e) { alert("Failed to fetch."); }
        }
    </script>
</body>
</html>
